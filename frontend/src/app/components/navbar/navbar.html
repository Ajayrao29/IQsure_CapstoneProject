<nav class="navbar" *ngIf="auth.isLoggedIn()">
  <a class="navbar-brand" routerLink="/dashboard">
    <span>IQ<span class="accent">sure</span></span>
  </a>
  
  <!-- Admin Navigation -->
  <div class="navbar-links" *ngIf="isAdmin">
    <a routerLink="/admin/users" routerLinkActive="active">Users</a>
    <a routerLink="/admin/quiz-mgmt" routerLinkActive="active">Quizzes</a>
    <a routerLink="/admin/policy-mgmt" routerLinkActive="active">Policies</a>
    <a routerLink="/admin/badge-mgmt" routerLinkActive="active">Badges</a>
    <a routerLink="/admin/reward-mgmt" routerLinkActive="active">Rewards</a>
    <a routerLink="/admin/discount-rules" routerLinkActive="active">Discount Rules</a>
  </div>
  
  <!-- User Navigation -->
  <div class="navbar-links" *ngIf="!isAdmin">
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/quizzes" routerLinkActive="active">Quizzes</a>
    <a routerLink="/policies" routerLinkActive="active">Policies</a>
    <a routerLink="/my-policies" routerLinkActive="active">My Policies</a>
    <a routerLink="/savings" routerLinkActive="active">Savings</a>
    <a routerLink="/badges" routerLinkActive="active">Badges</a>
    <a routerLink="/achievements" routerLinkActive="active">Achievements</a>
    <a routerLink="/rewards" routerLinkActive="active">Rewards</a>
    <a routerLink="/leaderboard" routerLinkActive="active">Leaderboard</a>
  </div>
  
  <div class="navbar-right">
    <!-- User Profile Dropdown -->
    <div class="profile-dropdown" *ngIf="!isAdmin">
      <div class="profile-avatar">{{ getInitials() }}</div>
      <div class="profile-menu">
        <div class="profile-header">
          <div class="profile-avatar-large">{{ getInitials() }}</div>
          <div class="profile-info">
            <div class="profile-name">{{ userName }}</div>
            <div class="profile-email">{{ userEmail }}</div>
            <div class="profile-points">⭐ {{ userPoints }} points</div>
          </div>
        </div>
        <div class="profile-divider"></div>
        <button class="profile-logout" (click)="logout()">Logout</button>
      </div>
    </div>
    
    <!-- Admin Simple Display -->
    <span class="user-name" *ngIf="isAdmin">👤 {{ userName }}</span>
    <button class="btn-logout" (click)="logout()">Logout</button>
  </div>
</nav>
