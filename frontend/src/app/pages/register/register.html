<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛡️ IQ<span>sure</span></div>
    <h1>Create account</h1>
    <p class="subtitle">Join IQsure and start earning rewards</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="John Doe" [class.has-error]="error && (error.toLowerCase().includes('name') || error.toLowerCase().includes('all required'))" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" [class.has-error]="error && (error.toLowerCase().includes('email') || error.toLowerCase().includes('all required'))" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Min. 6 characters" [class.has-error]="error && (error.toLowerCase().includes('password') || error.toLowerCase().includes('all required'))" />
    </div>

    <div class="form-group">
      <label>Phone <span class="optional">(optional)</span></label>
      <input type="tel" [(ngModel)]="phone" placeholder="+1 555 000 0000" />
    </div>

    <button class="btn-primary" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creating account…' : 'Create Account' }}
    </button>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
