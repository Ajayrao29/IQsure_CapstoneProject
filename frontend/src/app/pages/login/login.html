<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛡️ IQ<span>sure</span></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          required
          />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
          />
      </div>

      <button
        class="btn-primary"
        type="submit"
        [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>

    </form>

    <p class="switch-link">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
