<div class="page">
  <div class="page-header">
    <h1>Reward Management</h1>
    <button class="btn-primary" (click)="showForm = !showForm">+ New Reward</button>
  </div>
  <div class="form-card" *ngIf="showForm">
    <h2>Create Reward</h2>
    <div class="form-row">
      <div class="form-group"><label>Reward Type</label><input [(ngModel)]="form.rewardType" placeholder="e.g. Premium Discount" /></div>
      <div class="form-group"><label>Discount Value (%)</label><input type="number" [(ngModel)]="form.discountValue" placeholder="10" /></div>
      <div class="form-group"><label>Expiry Date</label><input type="date" [(ngModel)]="form.expiryDate" /></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" (click)="save()">Create</button>
      <button class="btn-secondary" (click)="showForm = false">Cancel</button>
    </div>
  </div>
  <div class="loading" *ngIf="loading">Loading…</div>
  <div class="reward-grid" *ngIf="!loading">
    <div class="reward-card" *ngFor="let r of rewards">
      <div class="reward-card-top">
        <span class="reward-id">#{{ r.rewardId }}</span>
        <span class="reward-expiry">{{ r.expiryDate | date:'mediumDate' }}</span>
      </div>
      <h3 class="reward-card-type">{{ r.rewardType }}</h3>
      <div class="reward-card-value">
        <div class="discount-info">
          <span class="discount-number">{{ r.discountValue }}%</span>
          <span class="discount-label">OFF</span>
        </div>
        <div class="discount-bar-track">
          <div class="discount-bar-fill" [style.width.%]="r.discountValue"></div>
        </div>
      </div>
      <div class="reward-card-actions">
        <button class="btn-danger btn-sm" (click)="delete(r.rewardId)">Delete</button>
      </div>
    </div>
    <div class="empty-msg" *ngIf="rewards.length === 0">No rewards yet. Create one above.</div>
  </div>
</div>
