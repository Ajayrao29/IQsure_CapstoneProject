<div class="page">
  <div class="page-header">
    <h1>Reward Management</h1>
    <button class="btn-primary" (click)="showForm = !showForm">+ New Reward</button>
  </div>
  <div class="form-card" *ngIf="showForm">
    <h2>Create Reward</h2>
    <div class="form-row">
      <div class="form-group"><label>Reward Type</label><input [(ngModel)]="form.rewardType" placeholder="e.g. Premium Discount" /></div>
      <div class="form-group"><label>Discount Value (%)</label><input type="number" [(ngModel)]="form.discountValue" placeholder="10" /></div>
      <div class="form-group"><label>Expiry Date</label><input type="date" [(ngModel)]="form.expiryDate" /></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" (click)="save()">Create</button>
      <button class="btn-secondary" (click)="showForm = false">Cancel</button>
    </div>
  </div>
  <div class="loading" *ngIf="loading">Loading…</div>
  <div class="table-wrapper" *ngIf="!loading">
    <table>
      <thead><tr><th>ID</th><th>Type</th><th>Discount</th><th>Expiry</th><th>Action</th></tr></thead>
      <tbody>
        <tr *ngFor="let r of rewards">
          <td>{{ r.rewardId }}</td><td>{{ r.rewardType }}</td>
          <td><span class="disc-badge">{{ r.discountValue }}%</span></td>
          <td>{{ r.expiryDate | date:'mediumDate' }}</td>
          <td><button class="btn-danger btn-sm" (click)="delete(r.rewardId)">Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
