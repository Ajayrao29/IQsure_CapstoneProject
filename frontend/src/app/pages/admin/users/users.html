<div class="page">
  <div class="page-header">
    <h1>User Management</h1>
  </div>

  @if (loading) {
    <div class="loading">Loading users…</div>
  }

  @if (!loading) {
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Points</th><th>Role</th><th>Action</th>
          </tr>
        </thead>
        <tbody>
          @for (u of users; track u) {
            <tr>
              <td>{{ u.userId }}</td>
              <td>{{ u.name }}</td>
              <td>{{ u.email }}</td>
              <td>{{ u.phone || '—' }}</td>
              <td><span class="pts-badge">{{ u.userPoints }}</span></td>
              <td><span class="role-badge" [class.admin]="u.role === 'ROLE_ADMIN'">{{ u.role === 'ROLE_ADMIN' ? 'Admin' : 'User' }}</span></td>
              <td>
                <button class="btn-danger" (click)="deleteUser(u.userId)" [disabled]="u.role === 'ROLE_ADMIN'">Delete</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
