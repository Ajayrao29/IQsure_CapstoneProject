<div class="page">
  <div class="page-header">
    <h1>Badge Management</h1>
    <button class="btn-primary" (click)="showForm = !showForm">+ New Badge</button>
  </div>
  <div class="form-card" *ngIf="showForm">
    <h2>Create Badge</h2>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input [(ngModel)]="form.name" placeholder="Badge name" /></div>
      <div class="form-group"><label>Points Required</label><input type="number" [(ngModel)]="form.reqPoints" placeholder="100" /></div>
    </div>
    <div class="form-group"><label>Description</label><input [(ngModel)]="form.description" placeholder="What this badge represents" /></div>
    <div class="form-actions">
      <button class="btn-primary" (click)="save()">Create</button>
      <button class="btn-secondary" (click)="showForm = false">Cancel</button>
    </div>
  </div>
  <div class="loading" *ngIf="loading">Loading...</div>
  <div class="table-wrapper" *ngIf="!loading">
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Points Required</th><th>Action</th></tr></thead>
      <tbody>
        <tr *ngFor="let b of badges">
          <td>{{ b.badgeId }}</td><td>{{ b.name }}</td><td>{{ b.description }}</td>
          <td><span class="pts-badge">{{ b.reqPoints }} pts</span></td>
          <td><button class="btn-danger btn-sm" (click)="delete(b.badgeId)">Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
