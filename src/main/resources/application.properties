# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# Application Name
# ============================================================
spring.application.name=IQsure

# ============================================================
# H2 Database Configuration
# ============================================================
spring.datasource.url=jdbc:h2:mem:iqsuredb
spring.datasource.username=sa
spring.datasource.password=password123
spring.datasource.driver-class-name=org.h2.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 Console (accessible at /h2-console)
# ============================================================
spring.h2.console.enabled=true

# ============================================================
# Swagger / SpringDoc OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# OpenAPI metadata (replaces SwaggerConfig.java ? no class needed)
springdoc.info.title=IQsure - Gamified Insurance Literacy API
springdoc.info.description=REST API for the IQsure Insurance Quiz and Gamification Platform
springdoc.info.version=1.0
springdoc.info.contact.name=Hartford Team
springdoc.info.contact.email=support@iqsure.com
