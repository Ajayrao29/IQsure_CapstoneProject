# ==============================================================================
# FILE: application.properties
# LOCATION: src/main/resources/
# PURPOSE: Configuration file for the entire Spring Boot backend.
#          Spring Boot reads this file on startup to configure the server,
#          database, Swagger docs, and custom app settings.
#
# YOU CAN CHANGE THESE VALUES WITHOUT MODIFYING JAVA CODE.
#
# KEY SECTIONS:
#   1. Server Config - port 8080
#   2. H2 Database - in-memory database (data resets on restart)
#   3. JPA/Hibernate - auto-creates tables from @Entity classes
#   4. Swagger - API documentation at http://localhost:8080/swagger-ui.html
#   5. IQsure App Config - maps to config/AppConfig.java
# ==============================================================================

# ============================================================
# Server Configuration
# The backend runs on this port. Frontend connects to http://localhost:8080
# ============================================================
server.port=8080

# ============================================================
# Application Name
# ============================================================
spring.application.name=IQsure

# ============================================================
# H2 Database Configuration
# H2 file-based database -- data PERSISTS across server restarts.
# Database file stored in user home directory: ~/iqsuredb
# Access the H2 console at: http://localhost:8080/h2-console
#   - JDBC URL: jdbc:h2:file:~/iqsuredb
#   - Username: sa
#   - Password: password123
# ============================================================

spring.datasource.url=jdbc:h2:file:~/iqsuredb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=password123
spring.datasource.driver-class-name=org.h2.Driver

# ============================================================
# JPA / Hibernate Configuration
# - ddl-auto=update -- Creates tables if missing, keeps existing data
# - show-sql=true -- Prints SQL queries in the console (useful for debugging)
# ============================================================

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 Console (accessible at http://localhost:8080/h2-console)
# Lets you visually browse the database tables in your browser
# ============================================================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# Swagger / SpringDoc OpenAPI
# API documentation auto-generated from controllers.
# Visit: http://localhost:8080/swagger-ui.html to see all endpoints
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# OpenAPI metadata (displayed on the Swagger UI page)
springdoc.info.title=IQsure - Gamified Insurance Literacy API
springdoc.info.description=REST API for the IQsure Insurance Quiz and Gamification Platform
springdoc.info.version=1.0
springdoc.info.contact.name=Hartford Team
springdoc.info.contact.email=support@iqsure.com

# ============================================================
# IQsure Application Configuration
# These values are read by config/AppConfig.java
# Change them here to adjust gamification behavior without touching code.
# ============================================================
# Maximum total discount any user can get (even if rules add up to 80%)
iqsure.max-discount-cap=80.0
# Points earned per correct quiz answer (e.g., 3 correct x 10 = 30 points)
iqsure.points-per-correct-answer=10
# How many points to advance one level (e.g., 250 points = Level 3)
iqsure.points-per-level=100

# JWT Configuration
app.jwt.secret=IQsureSecretKeyForJwtTokenGenerationMustBeLongEnough123456789
app.jwt.expiration=86400000